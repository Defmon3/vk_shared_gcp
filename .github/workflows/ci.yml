name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gate:
    runs-on: [self-hosted, Linux]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - run: uv sync --frozen
      - run: bash ./check-all
